name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile introspection scripts (syntax)
        run: |
          python -m py_compile \
            skills/odoo-introspect/scripts/model_brief.py \
            skills/odoo-introspect/scripts/entrypoints.py \
            skills/odoo-introspect/scripts/metadata.py \
            skills/odoo-introspect/scripts/trace_flow.py \
            skills/odoo-introspect/scripts/field_refs.py \
            skills/odoo-introspect/scripts/preflight.py \
            skills/odoo-introspect/scripts/security_sim.py \
            skills/odoo-introspect/scripts/state_capture.py \
            skills/odoo-introspect/scripts/capabilities.py \
            skills/odoo-introspect/scripts/native_check.py \
            skills/odoo-introspect/scripts/viz.py \
            skills/odoo-introspect/scripts/facts.py \
            skills/odoo-introspect/scripts/dossier.py \
            skills/odoo-introspect/scripts/dossier_report.py \
            skills/odoo-introspect/scripts/fixture_factory.py \
            skills/odoo-introspect/scripts/fit_gap.py \
            skills/odoo-introspect/scripts/snapshot_cache.py \
            skills/odoo-introspect/scripts/evidence_schema.py \
            skills/odoo-introspect/scripts/pr_comment.py \
            skills/odoo-introspect/scripts/mcp_server.py \
            skills/odoo-introspect/scripts/uat_pack.py

      - name: Install test deps
        run: pip install pytest

      - name: Unit tests (pure functions, no Odoo needed)
        run: python -m pytest skills/odoo-introspect/scripts/tests -q
