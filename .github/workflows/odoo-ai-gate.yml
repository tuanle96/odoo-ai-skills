# ──────────────────────────────────────────────────────────────────────────────
# odoo-ai-gate.yml
#
# Runs the LOCAL Layer-I enforcement gates on every pull request and posts a
# sticky comment with the verdict.  Copy-paste this into any Odoo repo that
# uses odoo-ai-skills; adjust `addons_path` if your layout differs.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  WHAT RUNS HERE  (no Odoo instance, no DB — plain Python 3)            │
# │                                                                         │
# │  validate       Static anti-pattern linter: attrs/states, <tree>,      │
# │                 name_get, type='json' on 19+, create() without          │
# │                 @api.model_create_multi, search()/browse() in loops,    │
# │                 f-string cr.execute, uncommented sudo(), leftover debug  │
# │  scan-secrets   Secret/token scan on changed files before they merge   │
# │  deploy-gate    Aggregates an evidence bundle → approve/needs-human/block│
# │  evidence       Renders the bundle as PR-comment Markdown (v0.8+)      │
# └─────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  WHAT DOES NOT RUN HERE  (needs a real Odoo + odoo-bin shell)          │
# │                                                                         │
# │  all / brief / entrypoints / metadata   Layers A–C live-registry reads │
# │  trace                                  Layer D: real runtime sequence  │
# │  security                               Layer G: effective ACL sim      │
# │  scenarios                              Layer I: risk-based test gen    │
# │  env-fingerprint / upgrade-check        Layer I: instance-side checks   │
# │                                                                         │
# │  Run these on odoo.sh staging (where you have a shell + a copy of      │
# │  production data) or against a Docker/self-hosted instance.  Commit    │
# │  the resulting JSON to an evidence_bundle/ dir on the branch; the      │
# │  deploy-gate step will pick it up automatically.                       │
# │                                                                         │
# │  See skills/odoo-deploy/references/ci-integration.md for the           │
# │  odoo.sh recipe, Docker wrapper, and MCP integration notes.            │
# └─────────────────────────────────────────────────────────────────────────┘
# ──────────────────────────────────────────────────────────────────────────────

name: odoo-ai gate

on:
  pull_request:
    # Trigger on code and XML changes, or when an evidence bundle is committed.
    paths:
      - "**.py"
      - "**.xml"
      - "evidence_bundle/**"

  # Allow a manual run against any branch (useful for one-off audits).
  workflow_dispatch:
    inputs:
      targets:
        description: >
          Space-separated .py/.xml paths or an addons dir to validate.
          Leave empty to diff against the base branch automatically.
        required: false
        default: ""

jobs:
  gate:
    name: Layer I — local gates
    runs-on: ubuntu-latest
    permissions:
      contents: read         # actions/checkout (absent perms default to none once `permissions:` is set)
      pull-requests: write   # required to post / update the sticky PR comment

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so git diff against the base branch works reliably.
          fetch-depth: 0

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Resolve targets ──────────────────────────────────────────────────
      # Determine which .py / .xml files to lint.
      # • pull_request: diff against the PR base branch.
      # • workflow_dispatch: use the manual input if provided.
      # The targets are passed as a space-separated list to odoo-ai validate.
      - name: Resolve changed Odoo files
        id: targets
        run: |
          if [ -n "${{ inputs.targets }}" ]; then
            PATHS="${{ inputs.targets }}"
          else
            BASE="${{ github.base_ref }}"
            # Exclude test files: their fixtures legitimately contain EXAMPLE
            # secrets (AWS's AKIA…EXAMPLE key, sample PEM/JWT/base64) to test the
            # scanner itself — gating those as "leaked secrets" is a false positive.
            PATHS=$(git diff --name-only "origin/${BASE:-main}...HEAD" \
                    | grep -E '\.(py|xml)$' \
                    | grep -vE '(^|/)tests?/|(^|/)test_[^/]*\.(py|xml)$|_test\.(py|xml)$' \
                    | tr '\n' ' ')
          fi
          echo "paths=${PATHS}" >> "$GITHUB_OUTPUT"
          echo "Resolved targets: ${PATHS:-(none — docs-only change?)}"

      # ── 4. validate (LOCAL) ─────────────────────────────────────────────────
      # Runs the odoo-review checklist as a linter.
      # No Odoo, no DB.  Exits non-zero when blocking issues are found; we
      # continue-on-error so the PR comment is always posted either way.
      - name: odoo-ai validate
        id: validate
        run: |
          TARGETS="${{ steps.targets.outputs.paths }}"
          mkdir -p /tmp/odoo-ai-gate

          if [ -z "$TARGETS" ]; then
            echo '{"skipped": true, "summary": {"blocking": 0, "warning": 0}}' \
              > /tmp/odoo-ai-gate/validate.json
            echo "Nothing to validate."
            exit 0
          fi

          # --json prints ONLY the JSON report to stdout (validate accepts files or
          # a directory). The report carries summary.blocking / summary.warning;
          # the build-comment step reads those (the CLI itself exits 0).
          python3 skills/odoo-introspect/scripts/odoo-ai --json validate $TARGETS \
            > /tmp/odoo-ai-gate/validate.json
        continue-on-error: true

      # ── 5. scan-secrets (LOCAL) ─────────────────────────────────────────────
      # Catches secrets/tokens accidentally committed in .py or .xml files.
      # No Odoo, no DB.
      - name: odoo-ai scan-secrets
        id: scan
        run: |
          TARGETS="${{ steps.targets.outputs.paths }}"
          mkdir -p /tmp/odoo-ai-gate

          if [ -z "$TARGETS" ]; then
            echo '{"count": 0, "skipped": true}' > /tmp/odoo-ai-gate/scan_secrets.json
            exit 0
          fi

          # scan-secrets is one-file-at-a-time; sum the per-file counts into a
          # single canonical scan_secrets.json (deploy-gate blocks when count > 0).
          total=0
          for f in $TARGETS; do
            [ -f "$f" ] || continue
            n=$(python3 skills/odoo-introspect/scripts/odoo-ai --json scan-secrets "$f" \
                 | python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))")
            total=$((total + n))
          done
          echo "{\"count\": $total}" > /tmp/odoo-ai-gate/scan_secrets.json
          echo "potential secrets found: $total"
        continue-on-error: true

      # ── 6. deploy-gate + evidence (LOCAL, if bundle present) ────────────────
      # These steps only run when an evidence bundle exists on this branch.
      #
      # How to produce a bundle (outside this workflow):
      #   On odoo.sh staging or a Docker instance run:
      #     odoo-ai --db <DB> scenarios sale.order  → evidence_bundle/scenarios.json
      #     odoo-ai --db <DB> env-fingerprint       → evidence_bundle/fingerprint.json
      #     odoo-ai --db <DB> upgrade-check <model> --against old_brief.json
      #     odoo-ai --db <DB> security <model> --user <user>
      #     odoo-ai --db <DB> trace <model> <id> <method>
      #   Commit evidence_bundle/ to the branch.  This job picks it up here.
      #
      # deploy-gate  aggregates the JSON → approve / needs-human / block.
      # evidence     renders the bundle as Markdown for the PR comment (v0.8+).
      # Both LOCAL: no Odoo, no DB.
      - name: odoo-ai deploy-gate + evidence
        id: gate
        run: |
          # Detect a committed bundle dir.
          BUNDLE=""
          for candidate in evidence_bundle /tmp/odoo-ai/evidence_bundle; do
            if [ -d "$candidate" ] && [ "$(ls -A "$candidate" 2>/dev/null)" ]; then
              BUNDLE="$candidate"
              break
            fi
          done
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

          if [ -z "$BUNDLE" ]; then
            echo "No evidence bundle found — deploy-gate and evidence skipped."
            echo "Run the shell-bound layers on staging and commit evidence_bundle/ to this branch."
            exit 0
          fi

          echo "Bundle: $BUNDLE"
          mkdir -p /tmp/odoo-ai-gate

          # Wire the secret scan into the bundle so deploy-gate blocks on secrets.
          cp /tmp/odoo-ai-gate/scan_secrets.json "$BUNDLE/scan_secrets.json" 2>/dev/null || true

          # deploy-gate: --json → the report JSON. The decision is at .decision.decision.
          python3 skills/odoo-introspect/scripts/odoo-ai --json deploy-gate "$BUNDLE" \
            > /tmp/odoo-ai-gate/deploy_gate.json

          # evidence: --md-out writes the PR-ready Markdown (stdout is a small JSON status).
          python3 skills/odoo-introspect/scripts/odoo-ai evidence "$BUNDLE" \
            --md-out /tmp/odoo-ai-gate/evidence.md > /dev/null 2>&1 || \
            echo "_evidence command not available — upgrade to v0.9.0+_" \
            > /tmp/odoo-ai-gate/evidence.md
        continue-on-error: true

      # ── 7. Build PR comment ─────────────────────────────────────────────────
      - name: Build comment body
        run: |
          # Safe JSON path reader as a ONE-LINE python -c (a heredoc body would be
          # column-0 inside this YAML `run: |` block and break the scalar; jq may
          # be absent). Usage: G <file.json> key1 key2 ...
          G() { python3 -c "import sys,json,functools;print(functools.reduce(lambda o,k:o.get(k) if isinstance(o,dict) else None,sys.argv[2:],json.load(open(sys.argv[1]))) or '')" "$@" 2>/dev/null || echo ""; }
          # Shape validators → "ok" iff the report exists AND has the expected
          # TYPED shape (not merely valid JSON) — so a crashed gate that emits {}
          # or wrong-typed fields renders needs-human, NOT a false "clean".
          # Mirrors deploy_gate._artifact_valid (non-bool ints).
          VOK() { python3 -c "import sys,json;d=json.load(open(sys.argv[1]));s=d.get('summary');b=(s or {}).get('blocking');w=(s or {}).get('warning',0);sys.exit(0 if (isinstance(s,dict) and isinstance(b,int) and not isinstance(b,bool) and isinstance(w,int) and not isinstance(w,bool)) else 1)" "$1" >/dev/null 2>&1 && echo ok; }
          SOK() { python3 -c "import sys,json;c=json.load(open(sys.argv[1])).get('count');sys.exit(0 if (isinstance(c,int) and not isinstance(c,bool) and c>=0) else 1)" "$1" >/dev/null 2>&1 && echo ok; }
          {
            echo "## odoo-ai gate · Layer I"
            echo ""
            echo "| gate | result |"
            echo "|---|---|"

            # validate row — read the report summary, not the exit code
            vb=$(G /tmp/odoo-ai-gate/validate.json summary blocking)
            vw=$(G /tmp/odoo-ai-gate/validate.json summary warning)
            if grep -q '"skipped": true' /tmp/odoo-ai-gate/validate.json 2>/dev/null; then
              echo "| \`validate\` | ⏭ skipped (no .py/.xml changed) |"
            elif [ -z "$(VOK /tmp/odoo-ai-gate/validate.json)" ]; then
              echo "| \`validate\` | ⚠️ report missing/invalid — needs human |"
            elif [ "${vb:-0}" -gt 0 ] 2>/dev/null; then
              echo "| \`validate\` | ❌ ${vb} blocking — see output below |"
            elif [ "${vw:-0}" -gt 0 ] 2>/dev/null; then
              echo "| \`validate\` | ⚠ ${vw} warning(s) |"
            else
              echo "| \`validate\` | ✅ clean |"
            fi

            # scan-secrets row — read the summed count
            sc=$(G /tmp/odoo-ai-gate/scan_secrets.json count)
            if grep -q '"skipped": true' /tmp/odoo-ai-gate/scan_secrets.json 2>/dev/null; then
              echo "| \`scan-secrets\` | ⏭ skipped |"
            elif [ -z "$(SOK /tmp/odoo-ai-gate/scan_secrets.json)" ]; then
              echo "| \`scan-secrets\` | ⚠️ report missing/invalid — needs human |"
            elif [ "${sc:-0}" -gt 0 ] 2>/dev/null; then
              echo "| \`scan-secrets\` | 🚫 ${sc} potential secret(s) |"
            else
              echo "| \`scan-secrets\` | ✅ clean |"
            fi

            # deploy-gate row — read decision.decision
            dec=$(G /tmp/odoo-ai-gate/deploy_gate.json decision decision)
            if [ -z "${{ steps.gate.outputs.bundle }}" ]; then
              echo "| \`deploy-gate\` | ⏭ no bundle |"
            elif [ "$dec" = "approve" ]; then
              echo "| \`deploy-gate\` | ✅ approve |"
            elif [ "$dec" = "block" ]; then
              echo "| \`deploy-gate\` | 🚫 block |"
            else
              echo "| \`deploy-gate\` | 👤 needs-human |"
            fi

            echo ""
            echo "### \`validate\` output"
            echo '```'
            cat /tmp/odoo-ai-gate/validate.json 2>/dev/null || echo "(no output)"
            echo '```'

            # Include the evidence bundle render if present.
            if [ -s /tmp/odoo-ai-gate/evidence.md ]; then
              echo ""
              echo "---"
              cat /tmp/odoo-ai-gate/evidence.md
            fi

            echo ""
            echo "---"
            echo "> **Shell-bound layers** (introspect · scenarios · env-fingerprint · upgrade-check · security · trace)"
            echo "> require a real Odoo instance and do not run here."
            echo "> Run them on odoo.sh staging or a Docker instance, commit \`evidence_bundle/\` to this branch,"
            echo "> and re-push — deploy-gate and evidence will pick it up automatically."
            echo "> See [ci-integration.md](skills/odoo-deploy/references/ci-integration.md)."
          } > /tmp/odoo-ai-gate/comment.md

      # ── 8. Post sticky PR comment ───────────────────────────────────────────
      # marocchino/sticky-pull-request-comment upserts a single comment per
      # `header` key — one comment that updates on every push, no spam.
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: odoo-ai-gate
          path: /tmp/odoo-ai-gate/comment.md

      # ── 9. Enforce the gate ─────────────────────────────────────────────────
      # The earlier steps continue-on-error so the comment always posts. This
      # final step actually FAILS the job on a real blocker (validate blocking,
      # a secret, or a deploy-gate `block`) so the gate gates instead of advising.
      - name: Enforce gate
        run: |
          G() { python3 -c "import sys,json,functools;print(functools.reduce(lambda o,k:o.get(k) if isinstance(o,dict) else None,sys.argv[2:],json.load(open(sys.argv[1]))) or '')" "$@" 2>/dev/null || echo ""; }
          VOK() { python3 -c "import sys,json;d=json.load(open(sys.argv[1]));s=d.get('summary');b=(s or {}).get('blocking');w=(s or {}).get('warning',0);sys.exit(0 if (isinstance(s,dict) and isinstance(b,int) and not isinstance(b,bool) and isinstance(w,int) and not isinstance(w,bool)) else 1)" "$1" >/dev/null 2>&1 && echo ok; }
          SOK() { python3 -c "import sys,json;c=json.load(open(sys.argv[1])).get('count');sys.exit(0 if (isinstance(c,int) and not isinstance(c,bool) and c>=0) else 1)" "$1" >/dev/null 2>&1 && echo ok; }
          SKIP() { grep -q '"skipped": true' "$1" 2>/dev/null && echo skip; }
          fail=0
          # A required local report that ran but is missing/invalid-shape → fail
          # (a crashed gate must not be a green check).
          if [ -z "$(SKIP /tmp/odoo-ai-gate/validate.json)" ] && [ -z "$(VOK /tmp/odoo-ai-gate/validate.json)" ]; then
            echo "::error::validate: report missing or invalid shape"; fail=1
          fi
          if [ -z "$(SKIP /tmp/odoo-ai-gate/scan_secrets.json)" ] && [ -z "$(SOK /tmp/odoo-ai-gate/scan_secrets.json)" ]; then
            echo "::error::scan-secrets: report missing or invalid shape"; fail=1
          fi
          vb=$(G /tmp/odoo-ai-gate/validate.json summary blocking)
          [ "${vb:-0}" -gt 0 ] 2>/dev/null && { echo "::error::validate: ${vb} blocking finding(s)"; fail=1; }
          sc=$(G /tmp/odoo-ai-gate/scan_secrets.json count)
          [ "${sc:-0}" -gt 0 ] 2>/dev/null && { echo "::error::scan-secrets: ${sc} potential secret(s)"; fail=1; }
          dec=$(G /tmp/odoo-ai-gate/deploy_gate.json decision decision)
          [ "$dec" = "block" ] && { echo "::error::deploy-gate: block"; fail=1; }
          exit $fail
