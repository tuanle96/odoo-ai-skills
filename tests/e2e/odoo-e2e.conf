[options]
; docker-compose E2E only (docker-compose.e2e.yml). Points odoo at the compose
; `db` service; the smoke test passes -d / --no-http itself.
db_host = db
db_port = 5432
db_user = odoo
; the compose `db` service uses POSTGRES_HOST_AUTH_METHOD=trust (ephemeral test DB),
; so no db_password is needed — and no credential literal lives in the repo.
list_db = True
without_demo = all
